<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>CYBER BOLÃO | Brasil x Marrocos • Copa 2026</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at 15% 25%, #0a2a1f, #030c12);
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, 'Roboto', sans-serif;
            color: #f0f9ff;
            padding: 2rem 1.2rem;
            min-height: 100vh;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        .logo-area {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo-area h1 {
            font-size: 2.5rem;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #9effcf, #2eff9e);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 12px rgba(0,255,150,0.3);
        }

        .logo-area p {
            color: #bcdfd0;
            font-weight: 500;
            margin-top: 6px;
        }

        /* Layout duas colunas */
        .two-columns {
            display: flex;
            gap: 1.8rem;
            flex-wrap: wrap;
        }

        .col-left {
            flex: 1.2;
            min-width: 280px;
        }

        .col-right {
            flex: 0.9;
            min-width: 280px;
        }

        .card {
            background: rgba(12, 22, 32, 0.94);
            backdrop-filter: blur(2px);
            border: 1px solid rgba(46, 255, 158, 0.35);
            border-radius: 28px;
            padding: 1.6rem;
            margin-bottom: 1.8rem;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.5);
        }

        .info-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            gap: 1rem;
            text-align: center;
        }

        .info-item {
            background: #07121c;
            border-radius: 20px;
            padding: 0.9rem 1.2rem;
            flex: 1;
            min-width: 100px;
            border-bottom: 2px solid #2eff9e;
        }

        .info-item h3 {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #b3ffd8;
            margin-bottom: 0.3rem;
        }

        .info-item p {
            font-weight: 700;
            font-size: 1rem;
        }

        .timer-block {
            text-align: center;
            margin-top: 1rem;
            font-size: 1.2rem;
            font-weight: 700;
            background: #0a1420b3;
            padding: 0.7rem;
            border-radius: 60px;
            color: #caffdf;
            transition: all 0.3s;
        }

        .timer-block.urgent {
            background: #8b3a1c;
            color: #ffd966;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.9; transform: scale(1.01); }
            100% { opacity: 1; transform: scale(1); }
        }

        .match-title {
            text-align: center;
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 1rem;
        }

        .flags-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1.5rem;
            flex-wrap: wrap;
        }

        .team-card {
            text-align: center;
            background: #0f1a24;
            padding: 0.6rem 1.2rem;
            border-radius: 40px;
            min-width: 120px;
        }

        .flag-img {
            width: 70px;
            height: 50px;
            object-fit: cover;
            border-radius: 12px;
            box-shadow: 0 5px 12px rgba(0,0,0,0.4);
            border: 1px solid #46ffb0;
        }

        .team-name {
            margin-top: 0.5rem;
            font-weight: 800;
            font-size: 1rem;
        }

        .vs-badge {
            font-size: 1.5rem;
            font-weight: 800;
            background: #1e3a2f;
            padding: 0.2rem 1rem;
            border-radius: 50px;
            color: #c0ffe0;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-row-duo {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .form-row-duo .field {
            flex: 1;
            min-width: 150px;
        }

        input {
            width: 100%;
            background: #0c1825;
            border: 1px solid #2a4a3c;
            border-radius: 20px;
            padding: 0.8rem 1rem;
            color: white;
            font-size: 0.9rem;
            font-weight: 500;
            outline: none;
        }

        input:focus {
            border-color: #2eff9e;
            box-shadow: 0 0 8px #1eff90;
        }

        .placar-container {
            background: #07121e;
            border-radius: 24px;
            padding: 1rem;
            margin: 1rem 0;
        }

        .placar-title {
            text-align: center;
            font-weight: 600;
            color: #b3ffd8;
            margin-bottom: 0.8rem;
            font-size: 0.85rem;
        }

        .score-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
        }
