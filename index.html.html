:root{

*{
    margin:0;

}

body{
    background:
    radial-gradient(circle at top,#123b2d 0%,#081018 40%);
    color:var(--texto);

    padding:30px;
}

.container{
    max-width:1000px;
    margin:auto;
}

.header{
    text-align:center;
    margin-bottom:40px;
}

.logo{
    font-size:3rem;
    font-weight:700;
    color:white;
    text-shadow:0 0 20px rgba(0,255,136,.5);
}

.logo span{
    color:var(--verde);
}

.subtitulo{
    color:#c8d1da;

}

.card{
    background:rgba(16,26,37,.95);
    border:1px solid rgba(0,255,136,.2);
    border-radius:20px;
    padding:25px;
    box-shadow:0 10px 40px rgba(0,0,0,.3);
    margin-bottom:25px;
}

h2{
    color:var(--verde);
    margin-bottom:20px;
}

.identificacao{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:15px;
}

input{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:none;
    background:#1a2531;
    color:white;
    font-size:15px;
}

input[type=number]{
    text-align:center;
}

.jogos{
    display:grid;
    gap:20px;
}

.jogo{
    background:#182430;
    border-radius:15px;
    padding:20px;
    transition:.3s;
}

.jogo:hover{
    transform:translateY(-3px);
}

.times{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:25px;
    flex-wrap:wrap;
}

.time{
    text-align:center;
    min-width:120px;
}

.bandeira{
    font-size:50px;
    display:block;
    margin-bottom:8px;
}

.nome-time{
    font-weight:600;
}

.placar{
    display:flex;
    align-items:center;
    gap:10px;
}

.placar input{
    width:70px;
    font-size:20px;
    font-weight:bold;
}

.x{
    font-size:24px;
    font-weight:bold;
    color:var(--verde);
}

button{
    width:100%;
    padding:16px;
    border:none;
    border-radius:12px;
    background:linear-gradient(90deg,var(--verde),var(--verde2));
    color:black;
    font-weight:700;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:scale(1.02);
}

.footer{
    text-align:center;
    margin-top:25px;
    color:#7d8a97;
}

.obrigatorio{
    color:#ffcc00;
    font-size:12px;
    margin-top:8px;
}

</style>

</head>
